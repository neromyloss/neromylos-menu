<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neromylos Menu</title>
<style>
  :root{--dark:#0D1117;--card:#141A24;--bord:#1E2A3A;--gold:#C9A84C;--txt:#E8E0D0;--muted:#7C8A99}
  body.light{--dark:#F4F1E8;--card:#FFFFFF;--bord:#DDD6C6;--gold:#9A7B2E;--txt:#26211A;--muted:#8A7F6E}
  body.light .flags{background:#EDE7D7}
  body.light header{background:#EDE7D7}
  body.light .notices{background:#F7DCDC;border-color:#E0B0B0}
  body.light .notices .warn{color:#9A3A3A}
  #themeBtn{position:fixed;top:9px;right:10px;z-index:50;width:62px;height:30px;border-radius:15px;background:var(--card);border:1px solid var(--bord);cursor:pointer}
  #themeBtn .trk{position:absolute;top:0;height:30px;width:31px;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:2}
  #themeBtn .sun{left:0} #themeBtn .moon{right:0}
  #themeBtn .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:var(--gold);transition:transform .22s;z-index:1;transform:translateX(32px)}
  body.light #themeBtn .knob{transform:translateX(0)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--dark);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.4;padding-bottom:40px}
  .flags{position:sticky;top:0;z-index:10;background:#0A1520;border-bottom:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;justify-content:center}
  .flag{flex:0 0 auto;display:inline-flex;align-items:center;background:var(--card);border:1px solid var(--bord);border-radius:8px;padding:5px 9px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap}
  .flag.active{border-color:var(--gold);color:var(--gold);font-weight:700}
  .flag img{width:22px;height:auto;margin-right:5px;border-radius:2px;display:block}
  header{background:#0A1520;text-align:center;padding:22px 16px 20px;border-bottom:2px solid var(--gold)}
  header img{max-width:300px;width:80%;height:auto;display:block;margin:0 auto}
  header .sub{color:var(--gold);font-size:22px;font-style:italic;letter-spacing:3px;margin-top:14px}
  .wrap{max-width:680px;margin:0 auto;padding:0 14px}
  .info{margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .infobox{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:12px 22px;text-align:center;min-width:150px}
  .infobox .l{color:var(--muted);font-size:12px;letter-spacing:1px}
  .infobox .v{color:var(--gold);font-size:22px;font-weight:700;margin-top:2px}
  .cat{margin-top:26px}
  .cat h2{color:var(--gold);font-size:17px;letter-spacing:1px;padding:10px 4px;border-bottom:1px solid var(--bord);margin-bottom:6px}
  .item{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:12px 14px;margin:8px 0}
  .item .name{font-size:15px;font-weight:600}
  .item .desc{color:var(--muted);font-size:12px;margin-top:2px}
  .item .price{color:var(--gold);font-size:16px;font-weight:700;white-space:nowrap}
  .box{margin-top:14px;border-radius:10px;padding:14px;font-size:12.5px;line-height:1.8;text-align:center}
  .vat{background:var(--card);border:1px solid var(--bord)}
  .notices{background:#1A1010;border:1px solid #5a2a2a}
  .notices .warn{color:#E8A0A0;font-weight:600}
  .contact{background:var(--card);border:1px solid var(--bord)}
  .contact a{color:var(--txt);text-decoration:none}
  .review{display:inline-block;margin-top:14px;background:var(--gold);color:#0A0F18;text-decoration:none;font-weight:700;font-size:14px;padding:10px 22px;border-radius:10px}
  .ty{text-align:center;margin-top:24px;color:var(--gold);font-style:italic;font-size:22px;letter-spacing:3px}
  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:20px}
</style>
</head>
<body>
<div id="themeBtn" title="Θέμα" onclick="document.body.classList.toggle('light');try{localStorage.setItem('nm_theme',document.body.classList.contains('light')?'light':'dark')}catch(e){}"><span class="trk sun">☀️</span><span class="trk moon">🌙</span><span class="knob"></span></div>
<script>try{if(localStorage.getItem('nm_theme')==='light')document.body.classList.add('light');}catch(e){}</script>

function pick(v,lang){ return (v && typeof v==="object") ? (v[lang]||v.en||v.el) : v; }

  document.documentElement.lang = lang;
